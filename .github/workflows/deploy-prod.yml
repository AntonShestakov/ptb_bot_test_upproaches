name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production   # enables required reviewers in GitHub

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ... same AWS/ECR steps as UAT ...

      - name: Build & Push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f docker/Dockerfile \
            -t $ECR_REGISTRY/peredachka:$IMAGE_TAG \
            -t $ECR_REGISTRY/peredachka:latest .
          docker push $ECR_REGISTRY/peredachka:$IMAGE_TAG
          docker push $ECR_REGISTRY/peredachka:latest

      - name: Deploy to EC2 (Production)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST_PROD }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY_PROD }}
          script: |
            export IMAGE_TAG=${{ github.sha }}
            export TELEGRAM_TOKEN=${{ secrets.TELEGRAM_TOKEN_PROD }}
            cd /home/ec2-user/bot
            bash scripts/deploy.sh prod