name: Deploy to UAT

on:
  push:
    branches: [uat, implement_ec2_deployment]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: uat

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f docker/Dockerfile \
            -t $ECR_REGISTRY/peredachka:$IMAGE_TAG \
            -t $ECR_REGISTRY/peredachka:uat-latest .
          docker push $ECR_REGISTRY/peredachka:$IMAGE_TAG
          docker push $ECR_REGISTRY/peredachka:uat-latest

      - name: Deploy to EC2 (UAT)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST_UAT }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY_UAT }}
          envs: IMAGE_TAG
          script: |
            export IMAGE_TAG=${{ github.sha }}
            cd /home/ec2-user/bot
            bash scripts/deploy.sh uat